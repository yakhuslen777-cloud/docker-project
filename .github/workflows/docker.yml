name: Docker CI

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3

      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend
      run: docker build -t my-backend ./backend

    - name: Tag Backend
      run: docker tag my-backend yaknow729/my-backend:latest

    - name: Push Backend
      run: docker push yaknow729/my-backend:latest
