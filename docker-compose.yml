version: '3'

services:

  frontend:
    build: ./frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

  backend:
    build: ./backend

    ports:
      - "5000:5000"

    environment:
      DB_HOST: database
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: mydb

    depends_on:
      - database

  database:
    image: postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
